<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Aroma Lounge</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2314100C'/%3E%3Ctext x='50' y='68' font-family='Cormorant Garamond,serif' font-style='italic' font-size='70' fill='%23B58A4B' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sb-brand">
        <div class="logo"><span class="mk">✦</span><span>Aroma</span></div>
        <div class="sub">Operator Console</div>
      </div>
      <div id="sidebar-nav"></div>
      <div class="sb-footer">
        <div class="sb-avatar">OH</div>
        <div class="sb-user">
          <div class="name">Omar Hassan</div>
          <div class="role">Owner</div>
        </div>
        <a href="../index.html" class="btn-icon-sm" title="Back to site">↗</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button id="mobile-trigger" class="mobile-trigger">☰</button>
        <div>
          <div id="page-title" class="tb-title">Dashboard</div>
          <div id="page-sub" class="tb-sub">Today · Live operations overview</div>
        </div>

        <div class="tb-search">
          <input type="text" placeholder="Search orders, items, customers, staff…" />
        </div>

        <div id="tb-date" class="tb-date">Live</div>

        <button class="tb-btn" aria-label="Notifications"><span>🔔</span><span class="dot"></span></button>
        <button class="tb-btn" aria-label="Help">?</button>
      </header>

      <div id="content" class="content"></div>
    </main>
  </div>

  <script src="../assets/js/menu-data.js"></script>
  <script src="mock-data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
