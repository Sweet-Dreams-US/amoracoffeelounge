<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu · Aroma Lounge</title>
  <meta name="description" content="The full Aroma Lounge menu. Order ahead, customize every drink, and pay through the app. Signature lattes, traditional Arabic coffee, matcha, refreshers, waffles, and more." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/menu.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2314100C'/%3E%3Ctext x='50' y='68' font-family='Cormorant Garamond,serif' font-style='italic' font-size='70' fill='%23B58A4B' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
</head>
<body>

  <!-- Navigation -->
  <nav class="nav scrolled">
    <a href="index.html" class="nav-logo">
      <span class="mark">✦</span>
      <span>
        Aroma
        <span class="sub">Lounge · Est 2026</span>
      </span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#story">Story</a></li>
      <li><a href="index.html#lounge">The Lounge</a></li>
      <li><a href="index.html#visit">Visit</a></li>
    </ul>
    <div class="nav-cta">
      <a href="#" id="cart-open-nav" class="btn btn-ghost" style="position:relative;">
        <span>Bag</span>
        <span data-cart-count style="position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; background:var(--bronze); color:var(--ink); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center;">0</span>
      </a>
    </div>
  </nav>

  <!-- Menu Header -->
  <div class="menu-page">
    <div class="container">
      <div class="menu-header reveal">
        <span class="eyebrow" style="justify-content:center;">The Menu</span>
        <h1 class="display display-lg">Order ahead.</h1>
        <p>Tap any item to customize and add to your bag. House syrups, milk swaps, and extra shots all available.</p>
      </div>
    </div>

    <!-- Category nav (sticky) -->
    <div class="cat-nav">
      <div class="cat-nav-track" id="cat-nav-track"></div>
    </div>

    <div class="container">
      <div id="menu-root"></div>
    </div>
  </div>

  <!-- Mask + Cart drawer (only — items customize inline, no product drawer) -->
  <div id="drawer-mask" class="drawer-mask"></div>

  <!-- Cart drawer -->
  <aside id="cart-drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <h3>Your Bag</h3>
      <button id="cart-drawer-close" class="drawer-close" aria-label="Close">×</button>
    </div>
    <div class="drawer-body"></div>
    <div id="cart-summary" class="cart-summary"></div>
  </aside>

  <!-- Floating cart button -->
  <button id="cart-fab" class="cart-fab" aria-label="Open cart">
    <span class="count">0</span>
    <span>View Bag</span>
    <span class="total">$0.00</span>
  </button>

  <!-- Toast -->
  <div id="toast" class="toast">
    <span class="check">✓</span>
    <span class="text"></span>
  </div>

  <script src="assets/js/menu-data.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/menu.js"></script>
</body>
</html>
